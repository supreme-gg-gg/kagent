# GDC (Google Distributed Cloud) Gemini Example
#
# Requirements:
# - Custom root CA
# - Custom endpoint
# - Custom header: x-goog-user-project: $PROJECT_HEADER
# - Authorization header: Short lived access token obtained via token exchange

---
apiVersion: v1
kind: Secret
metadata:
  name: gdch-sa
  namespace: kagent
type: Opaque
stringData:
  sa.json: |
    {
      "type": "gdch_service_account",
      "format_version": "1",
      "name": "my-sa",
      "project": "my-project",
      "private_key_id": "key-id",
      "private_key": "-----BEGIN EC PRIVATE KEY-----\n...\n-----END EC PRIVATE KEY-----\n",
      "token_uri": "https://service-identity.../authenticate",
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: gdch-ca-cert
  namespace: kagent
type: Opaque
stringData:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    (GDC cluster CA certificate in PEM format)
    -----END CERTIFICATE-----

---
# ModelConfig for the GDC Gemini inference gateway.
#
#   - provider: OpenAI     — GDC exposes an OpenAI-compatible API
#   - apiKeySecret         — holds the GDCH service account JSON
#   - openAI.baseUrl       — points at the GDC inference gateway
#   - openAI.tokenExchange — tells kagent to exchange the service account for
#                            a short-lived bearer token before each model call
#   - tls.caCertSecretRef  — the GDC cluster CA for inference gateway TLS
#   - tls.disableSystemCAs — only trust the GDC CA; no public CA access needed
#   - defaultHeaders       — set the GCP project for all requests
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: gdc-gemini
  namespace: kagent
spec:
  provider: OpenAI
  model: gemini-2.5-flash

  apiKeySecret: gdch-sa
  apiKeySecretKey: sa.json

  openAI:
    baseUrl: "https://inference-gateway.../chat"
    tokenExchange:
      type: GDCHServiceAccount
      gdchServiceAccount:
        audience: "https://inference-gateway..."

  defaultHeaders:
    x-goog-user-project: "my-project"

  tls:
    caCertSecretRef: gdch-ca-cert
    caCertSecretKey: ca.crt
    disableSystemCAs: true

---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: gdc-agent
  namespace: kagent
spec:
  type: Declarative
  description: "A general-purpose assistant running on GDC Gemini"
  declarative:
    modelConfig: gdc-gemini
    systemMessage: "You are a helpful assistant."
